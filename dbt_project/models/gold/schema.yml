version: 2

models:
  - name: dim_customer
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
  - name: dim_product
    columns:
      - name: product_id
        tests:
          - not_null
          - unique
  - name: dim_date
    columns:
      - name: date_key
        tests:
          - not_null
          - unique
  - name: fact_sales
    tests:
      - dbt_utils.expression_is_true:
          expression: "gross_sales_amount >= discount_amount"
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - relationships:
              to: ref('dim_customer')
              field: customer_id
      - name: product_id
        tests:
          - relationships:
              to: ref('dim_product')
              field: product_id
      - name: date_key
        tests:
          - relationships:
              to: ref('dim_date')
              field: date_key
