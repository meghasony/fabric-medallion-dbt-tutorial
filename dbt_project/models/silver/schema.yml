version: 2

models:
  - name: silver_customers
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
  - name: silver_products
    columns:
      - name: product_id
        tests:
          - not_null
          - unique
  - name: silver_orders
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - order_id
    columns:
      - name: order_id
        tests:
          - not_null
      - name: discount_percent
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100
              inclusive: true
