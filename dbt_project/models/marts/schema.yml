version: 2

models:
  - name: dim_customer
    columns:
      - name: customer_key
        tests: [not_null, unique]
      - name: customer_id
        tests: [not_null, unique]

  - name: dim_product
    columns:
      - name: product_key
        tests: [not_null, unique]
      - name: product_id
        tests: [not_null, unique]

  - name: dim_date
    columns:
      - name: date_key
        tests: [not_null, unique]

  - name: fact_sales
    columns:
      - name: sales_key
        tests: [not_null, unique]
      - name: order_id
        tests: [not_null, unique]
      - name: customer_id
        tests:
          - relationships:
              to: ref('dim_customer')
              field: customer_id
      - name: product_id
        tests:
          - relationships:
              to: ref('dim_product')
              field: product_id

  - name: sales_summary_by_month
  - name: product_performance_summary
  - name: customer_sales_summary
